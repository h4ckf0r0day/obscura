name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Informational for now (the tree has pre-existing style lints); tighten
      # to `-- -D warnings` once they are cleared with `cargo clippy --fix`.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked
      # No `--features stealth`: tests don't need the BoringSSL/TLS-impersonation
      # path, and it keeps CI off the fragile boring-sys build.
      # `--locked` enforces the committed Cargo.lock (SUPPLY-02): a build must use
      # the audited dependency set, not silently resolve to newer versions.
      - name: Test
        run: cargo test --workspace --locked

  stealth:
    name: Build & test (stealth / wreq)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # boring-sys (BoringSSL) runs bindgen, which needs libclang. Without it the
      # `--features stealth` build fails — which is why this path was previously
      # untested (the maintainers' Windows hosts lack libclang). Run it on Linux
      # so the stealth wreq client (SSRF re-validation, body-size pre-check) and
      # the browser stealth wiring are actually compiled and exercised.
      - name: Install libclang (BoringSSL bindgen)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - name: Test obscura-net (stealth)
        run: cargo test -p obscura-net --features stealth --locked
      - name: Build stealth surfaces
        run: cargo build -p obscura-browser --features stealth --locked

  advisories:
    name: Audit & Deny
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources

  semgrep:
    name: Semgrep (Rust SAST)
    runs-on: ubuntu-22.04
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      # Informational: Rust support is experimental and semgrep cannot run on
      # the maintainers' Windows hosts, so CI (Linux) is its natural home.
      - name: Semgrep scan
        run: semgrep scan --config p/rust --error
        continue-on-error: true
