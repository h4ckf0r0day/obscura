name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: obscura-x86_64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            name: obscura-aarch64-macos
          - target: x86_64-apple-darwin
            os: macos-13
            name: obscura-x86_64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: obscura-x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libclang-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja llvm

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'InstallDir="C:\\cmake"'
          choco install ninja llvm

      - name: Install bindgen
        uses: taiki-e/install-action@v2
        with:
          tool: bindgen-cli

      - name: Build BoringSSL
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          git clone --depth=1 https://github.com/google/boringssl.git boringssl
          cd boringssl
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRUST_BINDINGS=${{ matrix.target }}
          ninja -C build
          set BORINGSSL_BUILD_DIR=boringssl/build
          cargo build --release --target ${{ matrix.target }} --features stealth

      - name: Install BoringSSL (Unix)
        if: runner.os != 'Windows'
        run: |
          git clone --depth=1 https://github.com/google/boringssl.git boringssl
          cd boringssl
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRUST_BINDINGS=${{ matrix.target }}
          ninja -C build
          export BORINGSSL_BUILD_DIR=$(pwd)/boringssl/build
          cargo build --release --target ${{ matrix.target }} --features stealth

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz obscura
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip obscura.exe
          cd ../../..

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
