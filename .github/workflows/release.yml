name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            # Build on Ubuntu 22.04 so the Linux release binary works on
            # common LTS servers with glibc 2.35 instead of requiring the
            # newer glibc shipped by ubuntu-latest.
            os: ubuntu-22.04
            name: obscura-x86_64-linux
            cross: false
          - target: aarch64-unknown-linux-gnu
            # Native build on GitHub's ARM runner.
            os: ubuntu-22.04-arm
            name: obscura-aarch64-linux
            cross: false
          - target: aarch64-unknown-linux-gnu
            # Cross-compile fallback from x86_64 Ubuntu 22.04. Same glibc
            # 2.35 floor, useful when ARM runners are unavailable.
            os: ubuntu-22.04
            name: obscura-aarch64-linux-cross
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            name: obscura-aarch64-macos
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            name: obscura-x86_64-macos
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: obscura-x86_64-windows
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain (aarch64-linux)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'CARGO_EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          CARGO_EOF

      - name: Build
        # --locked: release artifacts must build from the committed, audited
        # Cargo.lock, never a silently-newer dependency set (SUPPLY-02).
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build stealth
        run: cargo build --release --locked --target ${{ matrix.target }} --features stealth
        continue-on-error: true

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz obscura obscura-worker
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip obscura.exe obscura-worker.exe
          cd ../../..

      # SUPPLY-01: publish a SHA-256 checksum next to each archive so the
      # `curl | tar` install instructions can be verified before extraction.
      - name: Checksum (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $h = (Get-FileHash ${{ matrix.name }}.zip -Algorithm SHA256).Hash.ToLower()
          "$h  ${{ matrix.name }}.zip" | Out-File -Encoding ascii ${{ matrix.name }}.zip.sha256

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256
